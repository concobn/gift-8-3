<!DOCTYPE html>
<html>

<head>
<title>Quà bất ngờ</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin-top:200px;
}

#count{
font-size:60px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>🎁 Quà bất ngờ đang mở...</h1>

<p>Vui lòng chờ</p>

<div id="count">5</div>

<script>

let time = 5

let countdown = setInterval(function(){

time--

document.getElementById("count").innerText = time

if(time == 0){

clearInterval(countdown)

window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"

}

},1000)

</script>

</body>

</html>
